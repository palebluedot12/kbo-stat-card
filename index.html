<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크보픽 · KBO 선수 카드</title>
<style>
  :root{--bg:#0a0e1a;--panel:#121829;--line:#2a3550;--txt:#e8edf8;--sub:#8a96b4}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#16203a 0%,var(--bg) 60%);color:var(--txt);min-height:100vh;padding:24px 18px 60px}
  h1{font-size:21px;letter-spacing:-.5px;margin:0 0 3px;font-weight:900}
  .tag{color:var(--sub);font-size:12px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:none;border:none;color:var(--sub);padding:7px 16px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer}
  .seg button.on{background:#2b6fff;color:#fff}

  /* op.gg식 상단 탭바 */
  .topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;height:56px;
    margin:-24px -18px 18px;padding:0 20px;overflow-x:auto;
    background:linear-gradient(180deg,#16213c,#0d1322);border-bottom:1px solid #2a3550;box-shadow:0 4px 18px -8px rgba(0,0,0,.6)}
  .topbar .logo{font-weight:900;font-size:16px;letter-spacing:-.3px;margin-right:24px;white-space:nowrap;
    background:linear-gradient(90deg,#ffd86b,#ff7a1c);-webkit-background-clip:text;background-clip:text;color:transparent}
  .topbar .tabs{display:flex;height:100%}
  .topbar .tabs a{display:flex;align-items:center;height:100%;padding:0 18px;color:var(--sub);font-weight:800;font-size:15px;
    text-decoration:none;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
  .topbar .tabs a:hover{color:var(--txt);background:rgba(255,255,255,.04)}
  .topbar .tabs a.on{color:#fff;border-bottom-color:#2b6fff}

  /* 타자/투수 토글 강조 */
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;max-width:1240px;margin:0 auto 18px}
  .typetoggle{padding:4px;border:1px solid #33415f;border-radius:13px;box-shadow:0 6px 20px -10px rgba(0,0,0,.6)}
  .typetoggle button{padding:11px 30px;font-size:15.5px;border-radius:10px;transition:.15s}
  .typetoggle button.on{background:#2b6fff;color:#fff;box-shadow:0 6px 16px -6px #2b6fff}

  .wrap{display:flex;gap:22px;align-items:flex-start;justify-content:flex-start;flex-wrap:wrap;max-width:1240px;margin:0 auto}
  .detail{display:flex;gap:18px;align-items:flex-start;justify-content:flex-start;flex-wrap:wrap}
  .leftcol{display:flex;flex-direction:column;align-items:flex-start;gap:10px}
  .dlbtn{width:42px;height:42px;border-radius:12px;background:linear-gradient(160deg,#2b6fff,#1b4fd0);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -6px #2b6fff;transition:.15s}
  .dlbtn:hover{filter:brightness(1.12);transform:translateY(-1px)} .dlbtn:disabled{opacity:.55;cursor:default}

  .card{width:344px;border-radius:24px;padding:2px;position:relative;flex-shrink:0;background:linear-gradient(160deg,var(--g1),var(--g2));
    box-shadow:0 30px 70px -25px var(--glow),0 0 0 1px rgba(255,255,255,.04) inset;transition:.45s cubic-bezier(.2,.8,.2,1)}
  .card-inner{background:linear-gradient(165deg,#141b2e 0%,#0c1120 100%);border-radius:22px;padding:20px 22px 22px;position:relative;overflow:hidden}
  .shine{position:absolute;inset:0;background:radial-gradient(440px 220px at 78% -8%,var(--glow) 0%,transparent 60%);opacity:.55;pointer-events:none}
  .top{display:flex;align-items:center;gap:14px;position:relative}
  .badge{width:70px;height:88px;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--g1),var(--g2));box-shadow:0 8px 24px -8px var(--glow);flex-shrink:0}
  .badge .lt{font-size:44px;font-weight:900;line-height:1;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.35)}
  .badge .ov{font-size:10px;font-weight:800;color:rgba(255,255,255,.95);margin-top:4px;letter-spacing:.3px}
  .photo{width:74px;height:90px;border-radius:12px;object-fit:cover;object-position:top center;background:#1c2742;border:2px solid var(--g1);flex-shrink:0}
  .who{flex:1;min-width:0}
  .who .nm{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.05}
  .who .chips{margin-top:9px;display:flex;gap:5px;flex-wrap:wrap}
  .who .team{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,.08)}
  .who .qb{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
  .who .qb.y{background:rgba(43,111,255,.18);color:#7fb0ff}
  .who .qb.n{background:rgba(255,160,60,.16);color:#ffb84d}
  .who .role{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;background:rgba(120,200,140,.15);color:#7fd99a}
  .who .line{font-size:11.5px;color:var(--sub);margin-top:9px;font-weight:600}
  .who .line b{color:var(--txt)}

  .radar-wrap{position:relative;margin:6px 0 0;display:flex;justify-content:center}
  svg{display:block;overflow:visible}
  .axis-lbl{font-size:11.5px;font-weight:800;fill:var(--txt)}
  .axis-grade{font-size:9px;font-weight:900}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:14px}
  .stat{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:11px;padding:8px 5px;text-align:center}
  .stat .k{font-size:9.5px;color:var(--sub);font-weight:700;white-space:nowrap}
  .stat .v{font-size:16px;font-weight:900;margin-top:3px;letter-spacing:-.5px}
  .stat .sg{font-size:9px;font-weight:900;margin-top:2px}
  .legend{margin-top:13px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;font-size:9px;font-weight:800;color:var(--sub)}
  .legend span{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.04)}
  .ovrnote{margin-top:8px;text-align:center;font-size:9.5px;color:#6c7894;line-height:1.5}
  .brand{margin-top:10px;text-align:center;font-size:11px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .traj{width:320px;max-width:100%;align-self:flex-start;background:linear-gradient(165deg,#141b2e,#0c1120);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px}
  .traj h3{font-size:14px;margin:0 0 2px;font-weight:900}
  .traj .sub{font-size:10.5px;color:var(--sub);margin-bottom:8px}
  .traj svg{display:block;margin:0 auto}
  .traj .toggles{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
  .traj .tg{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;border:1px solid var(--line);cursor:pointer;color:var(--txt)}
  .traj .tg.off{opacity:.4;text-decoration:line-through;color:var(--sub)}
  .traj .tg .d{width:9px;height:9px;border-radius:50%}
  .traj .ti{text-align:center;font-size:11px;color:var(--sub);margin-top:8px}

  .browser{width:490px;max-width:100%}
  .search{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:11px;font-size:14px;margin-bottom:12px}
  .teams{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .teams button{background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:6px 11px;border-radius:999px;font-size:12.5px;cursor:pointer;font-weight:700}
  .teams button:hover{color:var(--txt)} .teams button.on{background:#2b6fff;border-color:#2b6fff;color:#fff}
  .filterrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cnt{font-size:11.5px;color:var(--sub);font-weight:600}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:600px;overflow-y:auto;padding-right:4px}
  .chip{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;cursor:pointer;transition:.12s}
  .chip:hover{border-color:#3d4d72;transform:translateY(-1px)} .chip.on{border-color:var(--cg);box-shadow:0 0 0 1px var(--cg)}
  .chip img{width:38px;height:46px;border-radius:8px;object-fit:cover;object-position:top center;background:#1c2742;flex-shrink:0}
  .chip .ci{flex:1;min-width:0}
  .chip .cn{font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .ct{font-size:10.5px;color:var(--sub);font-weight:600;margin-top:2px}
  .chip .cg{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
  .note{max-width:900px;margin:24px auto 0;color:#6c7894;font-size:11px;text-align:center;line-height:1.7}
  ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#2a3550;border-radius:8px}
</style>
</head>
<body>
  <div class="topbar">
    <span class="logo">⚾ 크보픽</span>
    <nav class="tabs">
      <a href="index.html" class="on">선수 카드</a>
      <a href="myteam.html">마이팀</a>
      <a href="heroes.html">오늘의 BEST·WORST</a>
    </nav>
  </div>
  <div class="pagehead">
    <div>
      <h1>⚾ 선수 레이더 카드</h1>
      <div class="tag">2026 시즌 · KBO 공식기록 크롤링 · <span id="cntline"></span></div>
    </div>
    <div class="seg typetoggle"><button id="thit" class="on">🏏 타자</button><button id="tpit">⚾ 투수</button></div>
  </div>

  <div class="wrap">
    <div class="detail">
    <div class="leftcol">
      <button class="dlbtn" id="dl" title="이 카드 PNG로 저장">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>
      </button>
      <div class="card" id="card">
        <div class="card-inner">
          <div class="shine"></div>
          <div class="top">
            <div class="badge"><div class="lt" id="gl">A</div><div class="ov" id="ov">OVR 0/100</div></div>
            <img class="photo" id="photo" alt="">
            <div class="who">
              <div class="nm" id="nm">선수</div>
              <div class="chips" id="chips"></div>
              <div class="line" id="line"></div>
            </div>
          </div>
          <div class="radar-wrap"><svg id="radar" width="300" height="248" viewBox="0 0 300 248"></svg></div>
          <div class="stats" id="tbl"></div>
          <div class="legend" id="legend"></div>
          <div class="ovrnote" id="ovrnote"></div>
          <div class="brand">⚾ 크보픽 · 2026</div>
        </div>
      </div>
    </div>
    <div class="traj" id="trajPanel" style="display:none"></div>
    </div>

    <div class="browser">
      <input class="search" id="search" placeholder="🔍 선수 이름 검색...">
      <div class="teams" id="teams"></div>
      <div class="filterrow">
        <div class="seg" id="seg"></div>
        <div class="cnt" id="gridcnt"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="note">
    등급(OVR/100): <b>S</b> 80↑·<b>A</b> 68↑·<b>B</b> 54↑·<b>C</b> 40↑·<b>D</b> 26↑·<b>F</b> 26↓.
    백분위는 <b>동일 그룹</b> 분포 기준(타자=규정타석 / 투수=선발·구원 각 역할끼리). 슬래시라인/wRC+/FIP는 KBO 공식기록에서 자체 산출(파크팩터 미적용).
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="data.js"></script>
<script src="data_pitchers.js"></script>
<script src="positions.js"></script>
<script src="trajectory.js"></script>
<script src="traj_hr.js"></script>
<script>
const DATA={hit:(window.KBO_PLAYERS||[]),pit:(window.KBO_PITCHERS||[])};
DATA.hit.forEach(p=>{p.pos=(window.KBO_POS&&window.KBO_POS[p.pid])||'내야';});
const POSKR={'내야':'내야수','외야':'외야수','포수':'포수'};

// ===== 궤적: 구종별 투구위치 / 홈런 스프레이 =====
const TRAJ=window.KBO_TRAJ||{pitchers:{},hitters:{}};
const HR=window.KBO_HR||{hitters:{}};
const STUFFC={'직구':'#ff5a5a','포심':'#ff5a5a','투심':'#ff8a3d','싱커':'#ff8a3d','커터':'#ff3df0','슬라이더':'#4d9bff','커브':'#a78bff','체인지업':'#5fe3a6','포크':'#ffcf5c','스플리터':'#ffcf5c','스위퍼':'#2ee6e6','너클볼':'#99a'};
const stc=s=>STUFFC[s]||'#bbb';
let pActive=new Set();
function drawTraj(p){
  const panel=document.getElementById('trajPanel'); const isPit=TYPE==='pit';
  if(isPit){
    const data=(TRAJ.pitchers||{})[String(p.pid)];
    if(!data||!(data.pitches&&data.pitches.length)){ panel.style.display='none'; return; }
    panel.style.display='block'; pActive=new Set(data.pitches.map(x=>x.s)); renderZone(data);
  }else{
    // 타자는 항상 홈런 스프레이 패널 표시 (홈런 0개면 빈 그라운드 + 안내)
    const data=(HR.hitters||{})[String(p.pid)]||{hrs:[]};
    panel.style.display='block'; renderSpray(data);
  }
}
function renderZone(d){
  document.getElementById('trajPanel').innerHTML=`<h3>🎯 구종별 투구위치</h3><div class="sub">포수 시점 · ${TRAJ.from}~${TRAJ.to} · 총 ${d.pitches.length}구</div><svg id="tzone" width="290" height="320" viewBox="0 0 290 320"></svg><div class="toggles" id="ttg"></div><div class="ti">구종 눌러서 켜고 끄기</div>`;
  const cnt={}; d.pitches.forEach(p=>cnt[p.s]=(cnt[p.s]||0)+1);
  document.getElementById('ttg').innerHTML=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]).map(s=>`<span class="tg" data-s="${s}"><i class="d" style="background:${stc(s)}"></i>${s} ${cnt[s]}</span>`).join('');
  document.querySelectorAll('#ttg .tg').forEach(el=>el.onclick=()=>{const s=el.dataset.s;if(pActive.has(s))pActive.delete(s);else pActive.add(s);el.classList.toggle('off',!pActive.has(s));zoneDots(d);});
  zoneDots(d);
}
function zoneDots(d){
  const px=x=>145+x*66, py=z=>295-(z-0.5)*70;
  const zx1=px(-0.83),zx2=px(0.83),zy1=py(3.2),zy2=py(1.55); let s='';
  s+=`<rect x="${zx1}" y="${zy1}" width="${zx2-zx1}" height="${zy2-zy1}" fill="rgba(255,255,255,.04)" stroke="#5a6a8c" stroke-width="1.5"/>`;
  for(let i=1;i<3;i++){const gx=zx1+(zx2-zx1)*i/3,gy=zy1+(zy2-zy1)*i/3;s+=`<line x1="${gx}" y1="${zy1}" x2="${gx}" y2="${zy2}" stroke="#2a3550"/><line x1="${zx1}" y1="${gy}" x2="${zx2}" y2="${gy}" stroke="#2a3550"/>`;}
  s+=`<polygon points="${px(-0.83)},305 ${px(0.83)},305 ${px(0.83)},311 145,317 ${px(-0.83)},311" fill="#1c2742" stroke="#3a4a6a"/>`;
  d.pitches.filter(p=>pActive.has(p.s)).forEach(p=>{s+=`<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.z).toFixed(1)}" r="4.5" fill="${stc(p.s)}" fill-opacity="0.6"/>`;});
  document.getElementById('tzone').innerHTML=s;
}
function renderSpray(d){
  // 마이팀과 동일한 야구장(포수 뒤 시점) · 홈 (160,270), 담장반경 170
  const HX=160,HY=270,FEN=170,OUT=206;
  const P=(r,deg)=>[HX+r*Math.sin(deg*Math.PI/180),HY-r*Math.cos(deg*Math.PI/180)];
  const n=(v)=>v.toFixed(1);
  const fl=P(FEN,-45),fr=P(FEN,45),ol=P(OUT,-45),or=P(OUT,45);
  let s=`<defs><linearGradient id="fldg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4bb061"/><stop offset="1" stop-color="#2f8545"/></linearGradient></defs>`;
  // 담장 너머 스탠드 (어두운 외곽) — 먼저 깔기
  s+=`<path d="M${n(fl[0])} ${n(fl[1])} A${FEN} ${FEN} 0 0 1 ${n(fr[0])} ${n(fr[1])} L${n(or[0])} ${n(or[1])} A${OUT} ${OUT} 0 0 0 ${n(ol[0])} ${n(ol[1])} Z" fill="#11182b"/>`;
  // 마이팀 야구장 (홈→담장반경 320을 170로 축소: translate+scale)
  s+=`<g transform="translate(27.19 52.19) scale(0.53125)">
    <path d="M250 410 L476 184 A320 320 0 0 0 24 184 Z" fill="url(#fldg)"/>
    <path d="M250 410 L405 255 A220 220 0 0 0 95 255 Z" fill="#43a558" opacity="0.55"/>
    <path d="M250 410 L335 325 A120 120 0 0 0 165 325 Z" fill="#4aab5f" opacity="0.5"/>
    <line x1="250" y1="410" x2="24" y2="184" stroke="#fff" stroke-width="3" opacity="0.85"/>
    <line x1="250" y1="410" x2="476" y2="184" stroke="#fff" stroke-width="3" opacity="0.85"/>
    <path d="M250 410 L356 304 L250 198 L144 304 Z" fill="#d9a25d"/>
    <circle cx="250" cy="410" r="38" fill="#d9a25d"/>
    <path d="M250 391 L337 304 L250 217 L163 304 Z" fill="#46a85b"/>
    <g fill="#fff" stroke="#e2e2e2" stroke-width="1.5">
      <rect x="349" y="297" width="14" height="14" transform="rotate(45 356 304)"/>
      <rect x="243" y="191" width="14" height="14" transform="rotate(45 250 198)"/>
      <rect x="137" y="297" width="14" height="14" transform="rotate(45 144 304)"/></g>
    <polygon points="242,404 258,404 258,413 250,420 242,413" fill="#fff"/>
    <circle cx="250" cy="316" r="22" fill="#d9a25d"/><rect x="245" y="313" width="10" height="5" rx="1.5" fill="#fff"/>
  </g>`;
  // 담장 (노란 벽)
  s+=`<path d="M${n(fl[0])} ${n(fl[1])} A${FEN} ${FEN} 0 0 1 ${n(fr[0])} ${n(fr[1])}" fill="none" stroke="#ffd24a" stroke-width="4.5" stroke-linecap="round"/>`;
  s+=`<text x="${HX}" y="${n(P(FEN,0)[1]-6)}" fill="#ffd24a" font-size="10" font-weight="900" text-anchor="middle">담장</text>`;
  // 홈런 착지점 — 모두 담장 밖(스탠드)에 표시
  const Rd=dist=>Math.max(FEN+8,Math.min(OUT-3,FEN+8+(dist-100)*0.9));
  d.hrs.forEach(h=>{const r=Rd(h.dist),pt=P(r,h.deg),fp=P(FEN,h.deg);
    s+=`<line x1="${n(fp[0])}" y1="${n(fp[1])}" x2="${n(pt[0])}" y2="${n(pt[1])}" stroke="#ffcf5c" stroke-width="1.2" opacity=".5"/>`;
    s+=`<circle cx="${n(pt[0])}" cy="${n(pt[1])}" r="5.2" fill="#ff5a3c" stroke="#fff" stroke-width="1.4"/>`;
    s+=`<text x="${n(pt[0])}" y="${n(pt[1]-8)}" fill="#fff" font-size="8.5" font-weight="800" text-anchor="middle">${h.dist}</text>`;});
  if(!d.hrs.length){ s+=`<text x="${HX}" y="200" fill="#9aa7c2" font-size="13" font-weight="800" text-anchor="middle">이번 시즌 홈런 없음</text>`; }
  const rng=(HR.from?`${HR.from}~${HR.to}`:'시즌');
  document.getElementById('trajPanel').innerHTML=`<h3>🎯 홈런 스프레이</h3><div class="sub">${rng} · 홈런 ${d.hrs.length}개 · <span style="color:#ffd24a">노란선=담장(넘기면 홈런)</span></div><svg viewBox="0 0 320 290" width="100%" style="display:block;max-width:300px;margin:0 auto">${s}</svg>`;
}
const fmt3=v=>(v==null?'-':v.toFixed(3).replace(/^0/,''));
const f2=v=>(v==null?'-':v.toFixed(2));
const f1=v=>(v==null?'-':v.toFixed(1));

// ===== Simple WAR (ERA+ → 피타고리안 승률 → WAR) · 현재 실점 기준 =====
(function(){
  const pit=DATA.pit; if(!pit.length)return;
  let se=0,sip=0; pit.forEach(p=>{se+=p.ERA*p.IP;sip+=p.IP;});
  const lgERA=se/sip;                                          // IP가중 = 리그 평균자책
  pit.forEach(p=>{
    const era=Math.max(0.5,p.ERA);
    const ep=lgERA/era*100;                                    // ERA+ (100=리그평균, 높을수록 좋음)
    const wp=Math.pow(ep,1.8)/(Math.pow(ep,1.8)+Math.pow(100,1.8)); // 피타고리안 기대승률(지수 1.8)
    p.ERAplus=Math.round(ep);
    p.WAR=Math.round(((wp-0.38)/9*p.IP)*100)/100;              // (W%-.380)/9 × 이닝
  });
})();

// get=표시값, score=높을수록좋음(백분위용), ow=OVR가중
const AXES_HIT=[
  {kr:"타율",  ab:"AVG", get:p=>p.AVG, score:p=>p.AVG, fmt:fmt3, ow:1},
  {kr:"출루",  ab:"OBP", get:p=>p.OBP, score:p=>p.OBP, fmt:fmt3, ow:1},
  {kr:"장타",  ab:"SLG", get:p=>p.SLG, score:p=>p.SLG, fmt:fmt3, ow:1},
  {kr:"선구안",ab:"BB/K",get:p=>(p.BBK==null?0:p.BBK), score:p=>(p.BBK==null?0:p.BBK), fmt:f2, ow:0.5},
  {kr:"주루",  ab:"SB",  get:p=>p.SB, score:p=>p.SB, fmt:v=>String(v), ow:0.5},
  {kr:"생산력",ab:"wRC+",get:p=>p.wRCplus, score:p=>p.wRCplus, fmt:v=>String(v), ow:6},
];
const AXES_PIT=[
  {kr:"평자",  ab:"ERA", get:p=>p.ERA, score:p=>-p.ERA, fmt:f2, ow:1},
  {kr:"피출루",ab:"WHIP",get:p=>p.WHIP,score:p=>-p.WHIP,fmt:f2, ow:1},
  {kr:"탈삼진",ab:"K/9", get:p=>p.K9,  score:p=>p.K9,   fmt:f1, ow:1},
  {kr:"제구",  ab:"BB/9",get:p=>p.BB9, score:p=>-p.BB9, fmt:f1, ow:0.5},
  {kr:"이닝",  ab:"IP",  get:p=>p.IP,  score:p=>p.IP,   fmt:(v,p)=>p.ipText, ow:0.5},
  {kr:"종합",  ab:"FIP", get:p=>p.FIP, score:p=>-p.FIP, fmt:f2, ow:6},
];

function gradeOf(s){
  if(s>=80) return {l:"S",g1:"#ffd86b",g2:"#ff9f1c",glow:"rgba(255,176,32,.55)",c:"#ffcf5c"};
  if(s>=68) return {l:"A",g1:"#c89bff",g2:"#7b3ff2",glow:"rgba(150,80,255,.55)",c:"#c39bff"};
  if(s>=54) return {l:"B",g1:"#5fb8ff",g2:"#2b6fff",glow:"rgba(43,111,255,.5)", c:"#6fb4ff"};
  if(s>=40) return {l:"C",g1:"#5ce6a8",g2:"#16b07a",glow:"rgba(22,176,122,.45)",c:"#5fe3a6"};
  if(s>=26) return {l:"D",g1:"#9aa7c2",g2:"#5b6884",glow:"rgba(120,134,164,.4)",c:"#aab6cf"};
  return            {l:"F",g1:"#7a8499",g2:"#3a4358",glow:"rgba(80,90,110,.4)", c:"#8893ac"};
}
const CX=150,CY=120,R=78,ang=i=>(-90+i*60)*Math.PI/180;
const noimg="https://6ptotvmi5753.edge.naverncp.com/KBO_IMAGE/KBOHome/resources/images/common/no-Image.png";

let TYPE='hit',P=[],QUAL=[],AXES=[],BASELINES={},CUR=null;
let mode='all',curTeam="전체",curName="";
// 투수 역할별 표본 충족 기준
function enoughSample(p){
  if(TYPE==='hit') return p.qual;
  return (p.role==='선발'&&p.qual)||(p.role==='구원'&&p.IP>=20);
}
function keyOf(p){ return TYPE==='hit'?'hit':p.role; }
function buildBaselines(){
  BASELINES={};
  if(TYPE==='hit'){
    BASELINES['hit']=AXES.map(a=>QUAL.map(a.score).sort((x,y)=>x-y));
  }else{
    const sp=P.filter(p=>p.role==='선발'&&p.qual);   // 규정이닝 선발
    const rp=P.filter(p=>p.role==='구원'&&p.IP>=20);  // 20이닝↑ 구원
    BASELINES['선발']=AXES.map(a=>sp.map(a.score).sort((x,y)=>x-y));
    BASELINES['구원']=AXES.map(a=>rp.map(a.score).sort((x,y)=>x-y));
  }
}
function pct(i,v,key){const arr=BASELINES[key]&&BASELINES[key][i];if(!arr||arr.length===0)return 50;let c=0;for(const x of arr)if(x<=v)c++;return Math.min(100,c/arr.length*100);}

function render(p){
  if(!p)return; CUR=p;
  const key=keyOf(p);
  const vals=AXES.map((a,i)=>{const raw=a.get(p),n=pct(i,a.score(p),key);return{a,raw,n,g:gradeOf(n)};});
  const G=p._g;
  const card=document.getElementById('card');
  card.style.setProperty('--g1',G.g1);card.style.setProperty('--g2',G.g2);card.style.setProperty('--glow',G.glow);
  document.getElementById('gl').textContent=G.l;
  document.getElementById('ov').textContent="OVR "+p._ovr+"/100";
  document.getElementById('nm').textContent=p.name;
  const img=document.getElementById('photo');img.src=p.photo;img.style.borderColor=G.g1;img.onerror=()=>{img.onerror=null;img.src=noimg;};

  // chips + line (타입별)
  let chips=`<span class="team">${p.team}</span>`;
  if(TYPE==='pit'){
    chips+=`<span class="role">${p.role}</span>`;
    if(!enoughSample(p)) chips+=`<span class="qb n">표본 적음</span>`;
  }else{
    chips+=`<span class="role">${POSKR[p.pos]||'야수'}</span>`;
    chips+=`<span class="qb ${p.qual?'y':'n'}">${p.qual?'규정타석':'비규정'}</span>`;
  }
  document.getElementById('chips').innerHTML=chips;
  if(TYPE==='hit') document.getElementById('line').innerHTML=`${p.G}경기 · <b>${p.HR}</b>홈런 · <b>${p.RBI}</b>타점 · OPS <b>${fmt3(p.OPS)}</b>`;
  else document.getElementById('line').innerHTML=`<b>${p.ipText}</b>이닝 · ${p.W}승 ${p.L}패${p.SV>0?` ${p.SV}세`:''}${p.HLD>0?` ${p.HLD}홀`:''} · ERA <b>${f2(p.ERA)}</b> · <b style="color:var(--g1)">WAR ${p.WAR}</b>`;

  let s='';
  for(let r=1;r<=5;r++){const rr=R*r/5;let pts='';for(let i=0;i<6;i++)pts+=`${(CX+rr*Math.cos(ang(i))).toFixed(1)},${(CY+rr*Math.sin(ang(i))).toFixed(1)} `;s+=`<polygon points="${pts}" fill="none" stroke="#243049" stroke-width="1"/>`;}
  for(let i=0;i<6;i++)s+=`<line x1="${CX}" y1="${CY}" x2="${(CX+R*Math.cos(ang(i))).toFixed(1)}" y2="${(CY+R*Math.sin(ang(i))).toFixed(1)}" stroke="#243049" stroke-width="1"/>`;
  let vp='';vals.forEach((v,i)=>{const rr=R*Math.max(4,v.n)/100;vp+=`${(CX+rr*Math.cos(ang(i))).toFixed(1)},${(CY+rr*Math.sin(ang(i))).toFixed(1)} `;});
  s+=`<polygon points="${vp}" fill="${G.c}" fill-opacity="0.28" stroke="${G.c}" stroke-width="2.5" stroke-linejoin="round"/>`;
  vals.forEach((v,i)=>{const rr=R*Math.max(4,v.n)/100;s+=`<circle cx="${(CX+rr*Math.cos(ang(i))).toFixed(1)}" cy="${(CY+rr*Math.sin(ang(i))).toFixed(1)}" r="3.3" fill="#fff" stroke="${G.c}" stroke-width="2"/>`;});
  vals.forEach((v,i)=>{
    const lx=CX+(R+24)*Math.cos(ang(i)),ly=CY+(R+24)*Math.sin(ang(i));
    const anc=Math.abs(Math.cos(ang(i)))<0.3?'middle':(Math.cos(ang(i))>0?'start':'end');
    const dy=Math.sin(ang(i))>0.5?7:(Math.sin(ang(i))<-0.5?-5:0);
    s+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${anc}" class="axis-lbl">${v.a.kr}</text>`;
    s+=`<text x="${lx.toFixed(1)}" y="${(ly+dy+11).toFixed(1)}" text-anchor="${anc}" class="axis-grade" fill="${v.g.c}">${v.g.l}·${Math.round(v.n)}</text>`;
  });
  document.getElementById('radar').innerHTML=s;
  document.getElementById('tbl').innerHTML=vals.map(v=>`<div class="stat"><div class="k">${v.a.ab}(${v.a.kr})</div><div class="v">${v.a.fmt(v.raw,p)}</div><div class="sg" style="color:${v.g.c}">${v.g.l}</div></div>`).join('');
  document.getElementById('legend').innerHTML=['S','A','B','C','D','F'].map(L=>{const g=gradeOf(L=='S'?85:L=='A'?72:L=='B'?60:L=='C'?46:L=='D'?32:10);return `<span style="color:${g.c}">${L}</span>`;}).join('');
  document.getElementById('ovrnote').innerHTML=TYPE==='hit'
    ? 'OVR = <b>타격 종합등급</b> (wRC+ 중심 · 리그 백분위 100점) — 수비 미반영'
    : 'OVR = <b>Simple WAR 백분위</b> (역할 내 · ERA+ 피타고리안 기반) — 현재 실점 기준';
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',+ch.dataset.i===P.indexOf(p)));
  drawTraj(p);
}

// ===== BROWSER =====
const grid=document.getElementById('grid');
let TEAM_ORDER=[];
function pool(){
  if(TYPE==='hit') return mode==='qual'?QUAL:P;
  if(mode==='sp') return P.filter(p=>p.role==='선발');
  if(mode==='rp') return P.filter(p=>p.role==='구원');
  return P;
}
function buildSeg(){
  const seg=document.getElementById('seg');seg.innerHTML='';
  const opts=TYPE==='hit'?[['all','전체'],['qual','규정타석']]:[['all','전체'],['sp','선발'],['rp','구원']];
  opts.forEach(o=>{const b=document.createElement('button');b.textContent=o[1];if(o[0]===mode)b.classList.add('on');b.onclick=()=>{mode=o[0];buildSeg();buildGrid();};seg.appendChild(b);});
}
function buildTeams(){
  const box=document.getElementById('teams');box.innerHTML='';
  ['전체',...TEAM_ORDER].forEach(t=>{const b=document.createElement('button');b.textContent=t;if(t===curTeam)b.classList.add('on');b.onclick=()=>{curTeam=t;buildTeams();buildGrid();};box.appendChild(b);});
}
function buildGrid(){
  const list=pool().map(p=>({p,i:P.indexOf(p)}))
    .filter(o=>(curTeam==="전체"||o.p.team===curTeam)&&(!curName||o.p.name.includes(curName)))
    .sort((a,b)=>b.p._ovr-a.p._ovr);
  document.getElementById('gridcnt').textContent=`${list.length}명`;
  grid.innerHTML=list.map(o=>{
    const sub=TYPE==='hit'?`${o.p.team} · ${fmt3(o.p.AVG)} · OPS ${fmt3(o.p.OPS)}`:`${o.p.team} · ERA ${f2(o.p.ERA)} · ${o.p.role}`;
    return `<div class="chip" data-i="${o.i}" style="--cg:${o.p._g.c}">
      <img src="${o.p.photo}" onerror="this.onerror=null;this.src='${noimg}'">
      <div class="ci"><div class="cn">${o.p.name}${o.p.qual?'':' <span style="color:#ffb84d;font-size:9px">비규정</span>'}</div><div class="ct">${sub}</div></div>
      <div class="cg" style="background:linear-gradient(160deg,${o.p._g.g1},${o.p._g.g2})">${o.p._g.l}</div></div>`;
  }).join('')||`<div style="color:#6c7894;font-size:13px;padding:10px">결과 없음</div>`;
  grid.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>render(P[+ch.dataset.i]));
}

function setType(t){
  TYPE=t;P=DATA[t];QUAL=P.filter(p=>p.qual);AXES=(t==='hit')?AXES_HIT:AXES_PIT;mode='all';
  buildBaselines();
  if(t==='hit'){
    // 타자: wRC+ 중심 6축 가중 백분위
    P.forEach(p=>{let num=0,w=0;AXES.forEach((a,i)=>{num+=pct(i,a.score(p),'hit')*a.ow;w+=a.ow;});p._ovr=Math.round(num/w);p._g=gradeOf(p._ovr);});
  }else{
    // 투수: Simple WAR 백분위 (역할 내)
    const spW=P.filter(p=>p.role==='선발'&&p.qual).map(p=>p.WAR).sort((a,b)=>a-b);
    const rpW=P.filter(p=>p.role==='구원'&&p.IP>=20).map(p=>p.WAR).sort((a,b)=>a-b);
    const wpct=p=>{const arr=p.role==='선발'?spW:rpW;if(!arr.length)return 50;let c=0;for(const x of arr)if(x<=p.WAR)c++;return Math.min(100,c/arr.length*100);};
    P.forEach(p=>{p._ovr=Math.round(wpct(p));p._g=gradeOf(p._ovr);});
  }
  TEAM_ORDER=[...new Set(P.map(p=>p.team))];
  curTeam="전체";curName="";document.getElementById('search').value="";
  if(t==='hit'){
    document.getElementById('cntline').innerHTML=`전체 <b>${P.length}</b>명 · 규정타석 <b>${QUAL.length}</b>명`;
  }else{
    const sp=P.filter(p=>p.role==='선발').length,rp=P.filter(p=>p.role==='구원').length;
    document.getElementById('cntline').innerHTML=`전체 <b>${P.length}</b>명 · 선발 <b>${sp}</b> · 구원 <b>${rp}</b>`;
  }
  document.getElementById('thit').classList.toggle('on',t==='hit');
  document.getElementById('tpit').classList.toggle('on',t==='pit');
  buildSeg();buildTeams();buildGrid();render(pool()[0]);
}
document.getElementById('thit').onclick=()=>setType('hit');
document.getElementById('tpit').onclick=()=>setType('pit');
document.getElementById('search').oninput=e=>{curName=e.target.value.trim();buildGrid();};

document.getElementById('dl').onclick=function(){
  const btn=this,card=document.getElementById('card');
  if(typeof html2canvas==='undefined'){alert('이미지 라이브러리 로드 실패 (인터넷 확인)');return;}
  btn.disabled=true;
  html2canvas(card,{backgroundColor:null,scale:Math.max(3,(window.devicePixelRatio||1)*2),useCORS:true,logging:false}).then(cv=>{
    const a=document.createElement('a');a.download=`${CUR.name}_${CUR.team}_KBO카드.png`;a.href=cv.toDataURL('image/png');a.click();btn.disabled=false;
  }).catch(err=>{alert('생성 실패: '+err.message);btn.disabled=false;});
};

setType('hit');
</script>
