<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>궤적 뷰어 (프로토타입) · KBO</title>
<style>
  :root{--bg:#0a0e1a;--panel:#121829;--line:#2a3550;--txt:#e8edf8;--sub:#8a96b4}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#16203a 0%,var(--bg) 60%);color:var(--txt);min-height:100vh;padding:20px 16px 60px}
  a{color:inherit;text-decoration:none}
  .nav{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .nav a{background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:800}
  .nav a.on{background:#2b6fff;border-color:#2b6fff;color:#fff}
  h1{font-size:19px;text-align:center;margin:0 0 3px;font-weight:800}
  .tag{color:var(--sub);font-size:12px;text-align:center;margin-bottom:20px}
  .wrap{max-width:760px;margin:0 auto;display:flex;gap:22px;flex-wrap:wrap;justify-content:center}
  .panel{background:linear-gradient(165deg,#141b2e,#0c1120);border:1px solid var(--line);border-radius:18px;padding:18px;width:340px;max-width:100%}
  .panel h2{font-size:15px;margin:0 0 4px;font-weight:900}
  .panel .sub{font-size:11.5px;color:var(--sub);margin-bottom:10px}
  select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:12px}
  svg{display:block;margin:0 auto}
  .legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px;font-size:11px;font-weight:700}
  .legend span{display:flex;align-items:center;gap:4px;color:var(--sub)}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .info{font-size:11px;color:var(--sub);text-align:center;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
  <div class="nav">
    <a href="index.html">⚾ 선수 카드</a><a href="myteam.html">🏟️ 마이팀</a>
    <a href="heroes.html">🔥 오늘의 BEST·WORST</a><a href="trajectory.html" class="on">🎯 궤적</a>
  </div>
  <h1>🎯 궤적 뷰어 <span style="font-size:12px;color:var(--sub)">(프로토타입)</span></h1>
  <div class="tag">투수 구종별 투구위치 · 타자 홈런 스프레이 · 네이버 트래킹 데이터</div>

  <div class="wrap">
    <div class="panel">
      <h2>⚾ 투수 — 구종별 투구위치</h2>
      <div class="sub">포수 시점 · 스트라이크존 기준</div>
      <select id="psel"></select>
      <svg id="zone" width="300" height="330" viewBox="0 0 300 330"></svg>
      <div class="legend" id="plegend"></div>
      <div class="info" id="pinfo"></div>
    </div>

    <div class="panel">
      <h2>🏏 타자 — 홈런 스프레이</h2>
      <div class="sub">방향 + 비거리(최근 경기)</div>
      <select id="hsel"></select>
      <svg id="field" width="300" height="300" viewBox="0 0 300 300"></svg>
      <div class="info" id="hinfo"></div>
    </div>
  </div>

<script src="trajectory.js"></script>
<script>
const T=window.KBO_TRAJ||{};
const STUFFC={'직구':'#ff5a5a','포심':'#ff5a5a','투심':'#ff8a3d','커터':'#ff3df0','슬라이더':'#4d9bff','슬라이드':'#4d9bff','커브':'#a78bff','체인지업':'#5fe3a6','포크':'#ffcf5c','스플리터':'#ffcf5c','스위퍼':'#2ee6e6','너클볼':'#9aa'};
const sc=s=>STUFFC[s]||'#bbb';

// ===== 투수 존 =====
function px(x){ return 150 + x*68; }      // ft→px (가로)
function py(z){ return 300 - (z-0.5)*72; } // ft→px (세로, 높을수록 위)
function drawZone(pit){
  const top=pit.pitches.length?pit.pitches[0].top:3.19, bot=pit.pitches.length?pit.pitches[0].bot:1.55;
  let s='';
  // 존 박스 (가로 ±0.83ft = 플레이트+공)
  const zx1=px(-0.83),zx2=px(0.83),zy1=py(top),zy2=py(bot);
  s+=`<rect x="${zx1}" y="${zy1}" width="${zx2-zx1}" height="${zy2-zy1}" fill="rgba(255,255,255,.04)" stroke="#5a6a8c" stroke-width="1.5"/>`;
  // 9분할 그리드
  for(let i=1;i<3;i++){ const gx=zx1+(zx2-zx1)*i/3, gy=zy1+(zy2-zy1)*i/3;
    s+=`<line x1="${gx}" y1="${zy1}" x2="${gx}" y2="${zy2}" stroke="#2a3550"/><line x1="${zx1}" y1="${gy}" x2="${zx2}" y2="${gy}" stroke="#2a3550"/>`; }
  // 홈플레이트
  s+=`<polygon points="${px(-0.83)},315 ${px(0.83)},315 ${px(0.83)},322 150,328 ${px(-0.83)},322" fill="#1c2742" stroke="#3a4a6a"/>`;
  // 투구 점
  pit.pitches.forEach(p=>{ s+=`<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.z).toFixed(1)}" r="5" fill="${sc(p.stuff)}" fill-opacity="0.62" stroke="${sc(p.stuff)}" stroke-width="0.5"/>`; });
  document.getElementById('zone').innerHTML=s;
  // 범례 + 정보
  const byStuff={}; pit.pitches.forEach(p=>byStuff[p.stuff]=(byStuff[p.stuff]||0)+1);
  document.getElementById('plegend').innerHTML=Object.entries(byStuff).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<span><i class="dot" style="background:${sc(k)}"></i>${k} ${v}</span>`).join('');
  const sp=pit.pitches.map(p=>p.speed).filter(x=>x>0);
  document.getElementById('pinfo').textContent=`${pit.name} · 총 ${pit.pitches.length}구 · 최고 ${Math.max(...sp)}km/h`;
}

// ===== 타자 홈런 스프레이 =====
function drawField(h){
  const HX=150,HY=270,R=d=>Math.min(232,(d-70)*3.0); // 비거리→반지름
  let s='';
  // 외야 부채꼴
  s+=`<path d="M${HX} ${HY} L${HX-150} ${HY-150} A212 212 0 0 1 ${HX+150} ${HY-150} Z" fill="#2f7d43"/>`;
  s+=`<path d="M${HX} ${HY} L${HX-95} ${HY-95} A134 134 0 0 1 ${HX+95} ${HY-95} Z" fill="#3a8f4f" opacity=".5"/>`;
  // 파울선
  s+=`<line x1="${HX}" y1="${HY}" x2="${HX-150}" y2="${HY-150}" stroke="#fff" stroke-width="2" opacity=".7"/><line x1="${HX}" y1="${HY}" x2="${HX+150}" y2="${HY-150}" stroke="#fff" stroke-width="2" opacity=".7"/>`;
  s+=`<circle cx="${HX}" cy="${HY}" r="4" fill="#fff"/>`;
  // 홈런 점
  (h.hrs||[]).forEach(hr=>{ const rad=R(hr.dist), a=hr.deg*Math.PI/180;
    const x=HX+rad*Math.sin(a), y=HY-rad*Math.cos(a);
    s+=`<line x1="${HX}" y1="${HY}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#ffcf5c" stroke-width="1" opacity=".35"/>`;
    s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6" fill="#ffcf5c" stroke="#fff" stroke-width="1"/>`;
    s+=`<text x="${x.toFixed(1)}" y="${(y-9).toFixed(1)}" fill="#fff" font-size="9" font-weight="800" text-anchor="middle">${hr.dist}m</text>`;
  });
  document.getElementById('field').innerHTML=s;
  document.getElementById('hinfo').textContent=`${h.name} · 홈런 ${(h.hrs||[]).length}개`;
}

// 셀렉트
const psel=document.getElementById('psel');
if(T.pitcher){ const o=document.createElement('option');o.textContent=T.pitcher.name;psel.appendChild(o); drawZone(T.pitcher); }
const hsel=document.getElementById('hsel');
(T.hitters||[]).forEach((h,i)=>{ const o=document.createElement('option');o.value=i;o.textContent=`${h.name} (${h.hrs.length}홈런)`;hsel.appendChild(o); });
if((T.hitters||[]).length) drawField(T.hitters[0]);
hsel.onchange=e=>drawField(T.hitters[+e.target.value]);
</script>
</body>
</html>
