name: daily-heroes

on:
  schedule:
    # GitHub 예약은 best-effort라 누락될 수 있어 여러 번 시도(스크래퍼는 최신 종료일만·변경시에만 커밋이라 중복 안전)
    - cron: '30 14 * * *'   # 23:30 KST
    - cron: '0 16 * * *'    # 01:00 KST
    - cron: '30 17 * * *'   # 02:30 KST
    - cron: '30 19 * * *'   # 04:30 KST
    - cron: '0 22 * * *'    # 07:00 KST (아침 최종 보정)
  workflow_dispatch:
    inputs:
      date:
        description: '특정 날짜로 실행 (YYYY-MM-DD, 비우면 자동)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run heroes scraper
        shell: pwsh
        run: |
          $date = "${{ github.event.inputs.date }}"
          if (-not $date) { $date = (Get-Date).ToUniversalTime().AddHours(9).ToString('yyyy-MM-dd') }
          Write-Host "KST date: $date (종료경기 없으면 스크립트가 전날로 폴백)"
          ./scrape_heroes.ps1 -Date $date

      - name: Run weekly fantasy aggregator
        shell: pwsh
        run: ./scrape_week.ps1

      - name: Run season stats (hitters + pitchers)
        shell: pwsh
        continue-on-error: true
        run: |
          ./scrape.ps1
          ./scrape_pitchers.ps1

      - name: Run trajectory (pitch window + season HR)
        shell: pwsh
        continue-on-error: true
        run: ./scrape_trajectory.ps1

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add heroes.js weekly.js data.js data_pitchers.js trajectory.js traj_hr.js
          git diff --staged --quiet || git commit -m "auto: 일일 데이터 갱신 (BEST/WORST·주간·누적스탯)"
          git push
