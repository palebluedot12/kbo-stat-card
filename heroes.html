<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 BEST·WORST · KBO</title>
<style>
  :root{--bg:#0a0e1a;--panel:#121829;--line:#2a3550;--txt:#e8edf8;--sub:#8a96b4}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#16203a 0%,var(--bg) 60%);color:var(--txt);min-height:100vh;padding:20px 16px 60px}
  a{color:inherit;text-decoration:none}
  .nav{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .nav a{background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:8px 15px;border-radius:999px;font-size:13px;font-weight:800}
  .nav a.on{background:#2b6fff;border-color:#2b6fff;color:#fff}
  h1{font-size:19px;text-align:center;margin:0 0 3px;font-weight:900}
  .tag{color:var(--sub);font-size:12px;text-align:center;margin-bottom:20px}

  .grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:1340px;margin:0 auto}
  .gwrap{display:flex;flex-direction:column;align-items:center;gap:9px}
  .dlbtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(160deg,#ff9f1c,#ff7a1c);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -5px #ff8c1c;align-self:flex-end}
  .dlbtn:hover{filter:brightness(1.1)} .dlbtn:disabled{opacity:.5}

  .board{width:400px;max-width:92vw;border-radius:20px;padding:2px;
    background:linear-gradient(160deg,#ffd86b,#ff7a1c);box-shadow:0 24px 60px -22px rgba(255,150,30,.45)}
  .inner{background:linear-gradient(170deg,#161d30,#0b0f1d);border-radius:18px;padding:18px 16px 14px;position:relative;overflow:hidden}
  .glow{position:absolute;inset:0;background:radial-gradient(400px 180px at 80% -10%,rgba(255,170,40,.2),transparent 60%);pointer-events:none}
  .match{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:3px}
  .match .tm{font-size:16px;font-weight:900;letter-spacing:-.5px;flex:1}
  .match .tm.a{text-align:right}
  .match .sc{font-size:24px;font-weight:900;letter-spacing:0;color:#ffcf5c;white-space:nowrap}
  .match .win{color:#fff}
  .match .lose{color:#7b87a3}
  .dt{font-size:10.5px;color:var(--sub);text-align:center;font-weight:700;margin-bottom:13px}

  .sect{font-size:11px;font-weight:900;letter-spacing:2px;margin:4px 2px 7px;display:flex;align-items:center;gap:8px}
  .sect.b{color:#ffcf5c} .sect.w{color:#ff8a8a}
  .sect::after{content:"";height:1px;flex:1;background:currentColor;opacity:.25}

  .row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:13px;margin-bottom:7px;
    background:linear-gradient(100deg,rgba(255,255,255,.05),rgba(255,255,255,.015))}
  .row.r1{background:linear-gradient(100deg,rgba(255,200,60,.2),rgba(255,200,60,.04));border:1px solid rgba(255,200,60,.38)}
  .row.wst{background:linear-gradient(100deg,rgba(255,90,90,.13),rgba(255,90,90,.03));border:1px solid rgba(255,90,90,.22)}
  .medal{font-size:20px;width:26px;text-align:center;flex-shrink:0}
  .ph{width:46px;height:57px;border-radius:10px;object-fit:cover;object-position:top center;background:#1c2742;flex-shrink:0;border:2px solid rgba(255,255,255,.14)}
  .row.r1 .ph{border-color:#ffcf5c}
  .row.wst .ph{border-color:rgba(255,120,120,.5)}
  .info{flex:1;min-width:0}
  .info .nm{font-size:16.5px;font-weight:900;letter-spacing:-.4px;line-height:1.1}
  .info .meta{font-size:10px;color:var(--sub);font-weight:700;margin-top:2px}
  .info .line{font-size:11px;color:var(--txt);font-weight:700;margin-top:3px}
  .wpa{text-align:right;flex-shrink:0}
  .wpa .v{font-size:17px;font-weight:900;color:#ffcf5c;letter-spacing:-.5px}
  .row.wst .wpa .v{color:#ff8a8a}
  .wpa .l{font-size:8.5px;color:var(--sub);font-weight:800;letter-spacing:.5px}

  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:9px;border-top:1px solid rgba(255,255,255,.07)}
  .foot .brand{font-size:11px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,#ffd86b,#ff7a1c);-webkit-background-clip:text;background-clip:text;color:transparent}
  .foot .note{font-size:8.5px;color:#6c7894;text-align:right;line-height:1.4}
  .empty{text-align:center;color:var(--sub);padding:50px 0}
</style>
</head>
<body>
  <div class="nav">
    <a href="index.html">⚾ 선수 카드</a>
    <a href="myteam.html">🏟️ 마이팀</a>
    <a href="heroes.html" class="on">🔥 오늘의 BEST·WORST</a>
  </div>
  <h1>🔥 오늘의 BEST · WORST</h1>
  <div class="tag" id="datetag">경기별 득점 기여(REa) 기준</div>
  <div style="text-align:center;margin-bottom:18px"><a href="myteam.html" style="display:inline-block;background:linear-gradient(160deg,#2b6fff,#1b4fd0);color:#fff;padding:9px 18px;border-radius:11px;font-size:13px;font-weight:800;box-shadow:0 6px 16px -5px #2b6fff">🏟️ 이 선수들로 마이팀 짜러 가기 →</a><div style="font-size:10.5px;color:var(--sub);margin-top:7px">선수 카드를 누르면 마이팀에서 바로 검색돼요</div></div>

  <div class="grid" id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="heroes.js"></script>
<script>
const D=window.KBO_HEROES;
const noimg="https://6ptotvmi5753.edge.naverncp.com/KBO_IMAGE/KBOHome/resources/images/common/no-Image.png";
const medals=['🥇','🥈','🥉'];
function goMyteam(n){ location.href='myteam.html?q='+encodeURIComponent(n); }
function fmtDate(s){const[y,m,d]=s.split('-');const wd=['일','월','화','수','목','금','토'][new Date(s+'T00:00:00').getDay()];return `${y}.${m}.${d} (${wd})`;}
function prow(p,i,worst){
  const v=(p.rea==null?0:p.rea); const sign=v>=0?'+':'';
  return `<div class="row ${worst?'wst':'r'+(i+1)}" style="cursor:pointer" title="마이팀에서 ${p.name} 검색" onclick="goMyteam('${(p.name||'').replace(/'/g,'')}')">
    <div class="medal">${worst?'😵':medals[i]}</div>
    <img class="ph" src="${p.photo}" onerror="this.onerror=null;this.src='${noimg}'">
    <div class="info"><div class="nm">${p.name}</div><div class="meta">${p.team} · ${p.kind}</div><div class="line">${p.line}</div></div>
    <div class="wpa"><div class="v">${sign}${v.toFixed(2)}</div><div class="l">REa</div></div>
  </div>`;
}
function gameCard(g,idx){
  const awayWin=g.awayScore>g.homeScore;
  return `<div class="gwrap">
    <button class="dlbtn" data-i="${idx}" title="이 카드 PNG 저장">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>
    </button>
    <div class="board" id="board${idx}">
      <div class="inner">
        <div class="glow"></div>
        <div class="match">
          <div class="tm a ${awayWin?'win':'lose'}">${g.away}</div>
          <div class="sc"><span class="${awayWin?'win':'lose'}">${g.awayScore}</span> : <span class="${awayWin?'lose':'win'}">${g.homeScore}</span></div>
          <div class="tm ${awayWin?'lose':'win'}">${g.home}</div>
        </div>
        <div class="dt">${fmtDate(D.date)} · KBO 리그</div>
        <div class="sect b">BEST</div>
        ${g.best.map((p,i)=>prow(p,i,false)).join('')}
        <div class="sect w">WORST</div>
        ${prow(g.worst,0,true)}
        <div class="foot"><div class="brand">⚾ KBO 스탯카드</div><div class="note">REa = 득점 기여(상황 반영)<br>kbo-stat-card.vercel.app</div></div>
      </div>
    </div>
  </div>`;
}
if(!D||!D.games||!D.games.length){document.getElementById('grid').innerHTML='<div class="empty">아직 종료된 경기가 없습니다</div>';}
else{
  document.getElementById('datetag').textContent=`${fmtDate(D.date)} · 경기별 득점 기여(REa) 기준 · ${D.games.length}경기`;
  document.getElementById('grid').innerHTML=D.games.map((g,i)=>gameCard(g,i)).join('');
  document.querySelectorAll('.dlbtn').forEach(btn=>{
    btn.onclick=()=>{
      if(typeof html2canvas==='undefined'){alert('인터넷 확인');return;}
      const i=+btn.dataset.i, g=D.games[i];
      btn.disabled=true;
      html2canvas(document.getElementById('board'+i),{backgroundColor:null,scale:Math.max(3,(window.devicePixelRatio||1)*2),useCORS:true,logging:false}).then(cv=>{
        const a=document.createElement('a');a.download=`KBO_${D.date}_${g.away}vs${g.home}_BESTWORST.png`;a.href=cv.toDataURL('image/png');a.click();btn.disabled=false;
      }).catch(e=>{alert('실패: '+e.message);btn.disabled=false;});
    };
  });
}
</script>
</body>
</html>
