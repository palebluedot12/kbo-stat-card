<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 영웅 · KBO</title>
<style>
  :root{--bg:#0a0e1a;--panel:#121829;--line:#2a3550;--txt:#e8edf8;--sub:#8a96b4}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#16203a 0%,var(--bg) 60%);color:var(--txt);min-height:100vh;padding:20px 16px 60px}
  a{color:inherit;text-decoration:none}
  .nav{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
  .nav a{background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:8px 15px;border-radius:999px;font-size:13px;font-weight:800}
  .nav a.on{background:#2b6fff;border-color:#2b6fff;color:#fff}
  .dlbtn{display:block;margin:0 auto 16px;background:linear-gradient(160deg,#ff9f1c,#ff7a1c);border:none;color:#fff;padding:10px 18px;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px -6px #ff8c1c}
  .dlbtn:disabled{opacity:.5}

  /* 공유 보드 */
  .board{width:420px;max-width:100%;margin:0 auto;border-radius:22px;padding:2px;
    background:linear-gradient(160deg,#ffd86b,#ff7a1c);box-shadow:0 30px 70px -25px rgba(255,150,30,.5)}
  .inner{background:linear-gradient(170deg,#161d30,#0b0f1d);border-radius:20px;padding:20px 18px 16px;position:relative;overflow:hidden}
  .glow{position:absolute;inset:0;background:radial-gradient(420px 200px at 80% -10%,rgba(255,170,40,.22),transparent 60%);pointer-events:none}
  .bh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .bh .t{font-size:21px;font-weight:900;letter-spacing:-.5px}
  .bh .d{font-size:12px;color:var(--sub);font-weight:700}
  .sub{font-size:11px;color:var(--sub);margin-bottom:14px}

  .hero{display:flex;align-items:center;gap:13px;padding:11px;border-radius:15px;margin-bottom:9px;position:relative;
    background:linear-gradient(100deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
  .hero.r1{background:linear-gradient(100deg,rgba(255,200,60,.22),rgba(255,200,60,.05));border:1px solid rgba(255,200,60,.4)}
  .medal{font-size:26px;width:30px;text-align:center;flex-shrink:0}
  .ph{width:54px;height:66px;border-radius:11px;object-fit:cover;object-position:top center;background:#1c2742;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
  .hero.r1 .ph{border-color:#ffcf5c}
  .info{flex:1;min-width:0}
  .info .nm{font-size:19px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
  .info .meta{font-size:11px;color:var(--sub);font-weight:700;margin-top:3px}
  .info .line{font-size:12px;color:var(--txt);font-weight:700;margin-top:5px}
  .wpa{text-align:right;flex-shrink:0}
  .wpa .v{font-size:20px;font-weight:900;color:#ffcf5c;letter-spacing:-.5px}
  .wpa .l{font-size:9px;color:var(--sub);font-weight:800;letter-spacing:.5px}

  .divider{display:flex;align-items:center;gap:8px;margin:14px 2px 10px;color:#ff7a7a;font-size:11px;font-weight:900}
  .divider::before,.divider::after{content:"";height:1px;flex:1;background:rgba(255,120,120,.25)}
  .villain{display:flex;align-items:center;gap:13px;padding:10px 11px;border-radius:14px;
    background:linear-gradient(100deg,rgba(255,90,90,.13),rgba(255,90,90,.03));border:1px solid rgba(255,90,90,.22)}
  .villain .wpa .v{color:#ff8a8a}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:11px;border-top:1px solid rgba(255,255,255,.07)}
  .foot .brand{font-size:12px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,#ffd86b,#ff7a1c);-webkit-background-clip:text;background-clip:text;color:transparent}
  .foot .note{font-size:9px;color:#6c7894;text-align:right;line-height:1.4}
  .empty{text-align:center;color:var(--sub);padding:40px 0}
</style>
</head>
<body>
  <div class="nav">
    <a href="index.html">⚾ 선수 카드</a>
    <a href="myteam.html">🏟️ 마이팀</a>
    <a href="heroes.html" class="on">🔥 오늘의 영웅</a>
  </div>

  <button class="dlbtn" id="dl">📷 영웅 짤 저장 (PNG)</button>

  <div class="board" id="board">
    <div class="inner">
      <div class="glow"></div>
      <div class="bh"><div class="t">🔥 오늘의 영웅</div><div class="d" id="date"></div></div>
      <div class="sub">승리확률 기여(WPA) 기준 · 그날 전 경기 종합</div>
      <div id="list"></div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="heroes.js"></script>
<script>
const D=window.KBO_HEROES;
const noimg="https://6ptotvmi5753.edge.naverncp.com/KBO_IMAGE/KBOHome/resources/images/common/no-Image.png";
const medals=['🥇','🥈','🥉'];
function fmtDate(s){const[y,m,d]=s.split('-');const wd=['일','월','화','수','목','금','토'][new Date(s+'T00:00:00').getDay()];return `${y}.${m}.${d} (${wd})`;}
function row(p,i,villain){
  const sign=p.wpa>=0?'+':'';
  return `<div class="${villain?'villain':'hero r'+(i+1)}">
    ${villain?'<div class="medal">😵</div>':`<div class="medal">${medals[i]}</div>`}
    <img class="ph" src="${p.photo}" onerror="this.onerror=null;this.src='${noimg}'">
    <div class="info"><div class="nm">${p.name}</div><div class="meta">${p.team} · ${p.kind}</div><div class="line">${p.line}</div></div>
    <div class="wpa"><div class="v">${sign}${p.wpa.toFixed(2)}</div><div class="l">WPA</div></div>
  </div>`;
}
if(!D||!D.heroes){document.getElementById('list').innerHTML='<div class="empty">데이터 없음</div>';}
else{
  document.getElementById('date').textContent=fmtDate(D.date);
  let html=D.heroes.map((p,i)=>row(p,i,false)).join('');
  if(D.villain){ html+=`<div class="divider">오늘의 아쉬운 선수</div>`+row(D.villain,0,true); }
  html+=`<div class="foot"><div class="brand">⚾ KBO 스탯카드</div><div class="note">WPA = 승리확률 기여도<br>출처: KBO 경기기록</div></div>`;
  document.getElementById('list').innerHTML=html;
}
document.getElementById('dl').onclick=function(){
  const b=document.getElementById('board');if(typeof html2canvas==='undefined'){alert('인터넷 확인');return;}
  this.disabled=true;
  html2canvas(b,{backgroundColor:null,scale:Math.max(3,(window.devicePixelRatio||1)*2),useCORS:true,logging:false}).then(cv=>{
    const a=document.createElement('a');a.download=`KBO_오늘의영웅_${D?D.date:''}.png`;a.href=cv.toDataURL('image/png');a.click();this.disabled=false;
  }).catch(e=>{alert('실패: '+e.message);this.disabled=false;});
};
</script>
</body>
</html>
